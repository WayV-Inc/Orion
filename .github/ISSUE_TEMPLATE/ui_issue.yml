name: UI / UX Issue
description: Report interface or usability issues
title: "[UI] "
labels: ["ui"]
body:
  - type: textarea
    id: issue
    attributes:
      label: Issue Description
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      placeholder: Paste images or links
